<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RiffMates{% endblock %}</title>
    <style>
        /* Estilos básicos para la barra de navegación */
        .navbar { 
            background-color: #333; 
            overflow: hidden; 
            font-family: Arial, sans-serif; 
        }
        .navbar a { 
            float: left; 
            display: block; 
            color: white; 
            text-align: center; 
            padding: 14px 16px; 
            text-decoration: none; 
        }
        .navbar a:hover { 
            background-color: #ddd; 
            color: black; 
        }
        /* Contenedor principal para el contenido de las páginas hijas */
        .container { 
            padding: 20px; 
            font-family: Arial, sans-serif; 
        }
        /* Estilo para la paginación */
        .pagination {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="{% url 'home' %}">Inicio</a> 
        
        <a href="{% url 'musicians' %}">Músicos</a>
        <a href="{% url 'bands' %}">Bandas</a>
        <a href="{% url 'venues' %}">Locales</a>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
    
    <div class="navbar">
    <a href="{% url 'home' %}">Inicio</a>
    <a href="{% url 'musicians' %}">Músicos</a>
    <a href="{% url 'musician_add' %}" style="background-color: #4CAF50;">+ Nuevo Músico</a>
    </div>

</body>
</html>
