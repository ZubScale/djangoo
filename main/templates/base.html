{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RiffMates{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar">
        <a href="{% url 'home' %}">Inicio</a>
        <a href="{% url 'musicians' %}">Músicos</a>
        <a href="{% url 'bands' %}">Bandas</a>
        <a href="{% url 'venues' %}">Locales</a>
        <a href="{% url 'musician_add' %}" style="background-color: var(--primary-color);">+ Nuevo Músico</a>
    </div>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        &copy; 2023 RiffMates. Todos los derechos reservados.
    </footer>

</body>
</html>
